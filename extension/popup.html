<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TabAtlas</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2328;
      background: #ffffff;
    }
    body {
      margin: 0;
      min-width: 320px;
    }
    main {
      display: grid;
      gap: 12px;
      padding: 14px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
    }
    label {
      color: #57606a;
      display: grid;
      font-size: 12px;
      gap: 4px;
    }
    input {
      border: 1px solid #afb8c1;
      border-radius: 6px;
      box-sizing: border-box;
      font: inherit;
      min-height: 34px;
      padding: 7px 9px;
      width: 100%;
    }
    button {
      align-items: center;
      background: #f6f8fa;
      border: 1px solid #8c959f;
      border-radius: 6px;
      color: #24292f;
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      justify-content: center;
      min-height: 34px;
      padding: 6px 10px;
    }
    button.primary {
      background: #0969da;
      border-color: #0969da;
      color: #ffffff;
    }
    button.danger {
      border-color: #cf222e;
      color: #cf222e;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row button {
      flex: 1;
    }
    .status {
      border: 1px solid #d8dee4;
      border-radius: 6px;
      background: #f6f8fa;
      display: grid;
      gap: 4px;
      padding: 10px;
    }
    .badge {
      border: 1px solid #54aeff;
      border-radius: 999px;
      color: #0969da;
      display: inline-flex;
      font-size: 12px;
      padding: 2px 7px;
      width: fit-content;
    }
    .muted {
      color: #57606a;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .error {
      color: #cf222e;
    }
  </style>
</head>
<body>
  <main>
    <h1>TabAtlas</h1>
    <div id="status" class="status">
      <span class="badge">Checking</span>
      <div class="muted">Loading extension status...</div>
    </div>
    <label>
      Receiver
      <input id="receiver" value="http://127.0.0.1:9787">
    </label>
    <label>
      Challenge ID
      <input id="challengeId" autocomplete="off" spellcheck="false">
    </label>
    <label>
      Pairing secret
      <input id="secret" autocomplete="off" spellcheck="false">
    </label>
    <div class="row">
      <button class="primary" id="pair">Pair</button>
      <button id="exportNow">Export</button>
      <button class="danger" id="unpair">Unpair</button>
    </div>
    <div id="message" class="muted"></div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
