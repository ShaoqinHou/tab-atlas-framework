<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TabAtlas</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2328;
    }
    body {
      margin: 0;
    }
    header {
      background: #ffffff;
      border-bottom: 1px solid #d8dee4;
      padding: 18px 28px;
    }
    main {
      display: grid;
      grid-template-columns: minmax(360px, 1.1fr) minmax(360px, 0.9fr);
      gap: 18px;
      padding: 18px 28px 28px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 10px;
    }
    h2 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    section, .panel {
      background: #ffffff;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      padding: 16px;
    }
    .stack {
      display: grid;
      gap: 18px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 10px;
    }
    .metric {
      border: 1px solid #d8dee4;
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfd;
    }
    .metric span {
      display: block;
      color: #656d76;
      font-size: 12px;
    }
    .metric strong {
      font-size: 20px;
    }
    textarea, input, select {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #afb8c1;
      border-radius: 6px;
      padding: 10px;
      font: inherit;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
    }
    button, a.button {
      border: 1px solid #8c959f;
      background: #f6f8fa;
      border-radius: 6px;
      color: #24292f;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 6px 10px;
      text-decoration: none;
      white-space: nowrap;
    }
    button.primary {
      background: #0969da;
      border-color: #0969da;
      color: #ffffff;
    }
    button.danger {
      background: #fff1f1;
      border-color: #cf222e;
      color: #cf222e;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .chips button {
      min-height: 30px;
      padding: 4px 8px;
    }
    .chips button.active {
      background: #ddf4ff;
      border-color: #0969da;
      color: #0969da;
    }
    .filters button {
      min-height: 30px;
      padding: 4px 8px;
    }
    .filters button.active {
      background: #dafbe1;
      border-color: #1a7f37;
      color: #116329;
    }
    .resource-title {
      font-weight: 700;
      margin-bottom: 6px;
    }
    .muted {
      color: #656d76;
      font-size: 13px;
    }
    .counts {
      display: grid;
      grid-template-columns: repeat(5, minmax(80px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .count {
      background: #f6f8fa;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
    }
    .sample {
      border-top: 1px solid #d8dee4;
      padding: 10px 0;
    }
    .sample:last-child {
      padding-bottom: 0;
    }
    .notice {
      background: #fff8c5;
      border: 1px solid #d4a72c;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
    }
    .badge {
      background: #ddf4ff;
      border: 1px solid #54aeff;
      border-radius: 999px;
      color: #0969da;
      display: inline-flex;
      font-size: 12px;
      padding: 3px 8px;
    }
    .message {
      border-left: 3px solid #d8dee4;
      padding: 8px 10px;
      background: #fbfcfd;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }
    .message.user {
      border-left-color: #0969da;
    }
    .message.assistant {
      border-left-color: #1a7f37;
    }
    .action-card {
      border: 1px solid #d8dee4;
      border-radius: 6px;
      padding: 10px;
      margin-top: 8px;
      background: #ffffff;
    }
    .security-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .code-box {
      border: 1px solid #d8dee4;
      border-radius: 6px;
      background: #f6f8fa;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      padding: 10px;
      word-break: break-all;
    }
    .secret-input {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }
    @media (max-width: 900px) {
      main, .metrics {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>TabAtlas</h1>
    <div class="metrics" id="metrics"></div>
  </header>
  <main>
    <div class="stack">
      <section>
        <h2>Local Trust</h2>
        <div id="securityNotice" class="notice">Local token not loaded.</div>
        <input id="securityToken" class="secret-input" type="password" placeholder="Local dashboard token" autocomplete="off">
        <div class="row" style="margin-top:10px">
          <button id="saveSecurityTokenButton">Save token</button>
          <button id="clearSecurityTokenButton">Clear</button>
          <button class="primary" id="bootstrapAdminButton">Create admin token</button>
          <button id="refreshSecurityButton">Refresh trust</button>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="createPairingCodeButton">Create extension code</button>
        </div>
        <div id="pairingCode" style="margin-top:10px"></div>
        <div id="securityStatus" style="margin-top:10px"></div>
      </section>

      <section>
        <h2>Agent Conversation</h2>
        <div id="conversationTranscript" class="muted">No conversation loaded.</div>
        <textarea id="conversationText" placeholder="Ask TabAtlas"></textarea>
        <div class="row" style="margin-top:10px">
          <button id="newConversationButton">New thread</button>
          <button class="primary" id="sendConversationButton">Send</button>
        </div>
        <div id="actionCards"></div>
      </section>

      <section>
        <h2>Ask TabAtlas</h2>
        <textarea id="commandText">Make a loose group mainly game inspiration but welcome all marked inspiration</textarea>
        <div class="row" style="margin-top:10px">
          <label><input type="radio" name="plannerMode" value="codex" checked style="width:auto"> Codex agent</label>
          <label><input type="radio" name="plannerMode" value="heuristic" style="width:auto"> Fast heuristic preview</label>
          <select id="reasoningEffort">
            <option value="medium" selected>medium</option>
            <option value="low">low</option>
            <option value="high">high</option>
            <option value="xhigh">xhigh</option>
          </select>
        </div>
        <div class="row" style="margin-top:10px">
          <button class="primary" id="planButton">Plan</button>
          <button id="extractButton">Refresh extraction</button>
          <button id="scanButton">Codex scan 10</button>
        </div>
        <div id="commandResult" style="margin-top:14px"></div>
      </section>

      <section>
        <h2>Import Snapshot</h2>
        <input id="importPath" placeholder="Choose a JSON file under a configured capture root">
        <div class="row" style="margin-top:10px">
          <button id="importButton">Import</button>
          <button id="refreshButton">Refresh status</button>
        </div>
        <div id="captureRoots" class="muted" style="margin-top:10px"></div>
        <div id="importResult" class="muted" style="margin-top:10px"></div>
      </section>
    </div>

    <div class="stack">
      <section>
        <h2>Focused Review</h2>
        <div id="reviewCard"></div>
      </section>
      <section>
        <h2>Views</h2>
        <div id="viewsList"></div>
      </section>
      <section>
        <h2>Command History</h2>
        <div id="commandsList"></div>
      </section>
      <section>
        <h2>Jobs</h2>
        <div id="jobsList"></div>
      </section>
    </div>
  </main>

  <script>
    const chips = ['inspiration', 'game', 'art', 'ui', 'watch_later', 'project_reference', 'ignore'];
    const sampleStates = ['strong_include', 'weak_include', 'conflict', 'needs_review', 'exclude'];
    const TOKEN_STORAGE_KEY = 'tabatlas.localToken';
    let selectedTags = new Set();
    let activeSampleStates = new Set(sampleStates);
    let currentReview = null;
    let currentCommandResult = null;
    let activeThreadId = null;
    let conversationSnapshot = null;

    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const headers = {
        'content-type': 'application/json',
        ...(options.headers || {}),
      };
      const token = localStorage.getItem(TOKEN_STORAGE_KEY);
      if (token) headers['x-tab-atlas-token'] = token;
      const response = await fetch(path, {
        ...options,
        headers,
      });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    }

    async function refreshSecurityStatus(options = {}) {
      const token = localStorage.getItem(TOKEN_STORAGE_KEY) || '';
      $('securityToken').value = token;
      if (!token && options.silent) {
        renderSecurityLocked('No local dashboard token is saved.');
        return false;
      }
      try {
        const status = await api('/api/security/status');
        renderSecurityStatus(status);
        return true;
      } catch (error) {
        renderSecurityLocked(error.message || String(error));
        if (!options.silent) throw error;
        return false;
      }
    }

    function renderSecurityLocked(message) {
      $('securityNotice').textContent = message.includes('Unauthorized') || message.includes('denied') || message.includes('401') || message.includes('403')
        ? 'Local dashboard token required.'
        : message;
      $('securityStatus').innerHTML = '<div class="muted">Create the first admin token after starting the receiver, or paste an existing local token.</div>';
      $('pairingCode').innerHTML = '';
    }

    function renderSecurityStatus(status) {
      $('securityNotice').textContent = `Receiver bound to ${status.bound.host}:${status.bound.port}. Denied requests: ${status.deniedRequests}.`;
      $('securityStatus').innerHTML = `
        <div class="security-grid">
          <div class="metric"><span>Capabilities</span><strong>${status.capabilities.length}</strong></div>
          <div class="metric"><span>Pairing challenges</span><strong>${(status.pairingChallenges || status.pairingCodes || []).length}</strong></div>
        </div>
        <h2 style="margin-top:14px">Capabilities</h2>
        ${status.capabilities.length ? status.capabilities.map(renderCapability).join('') : '<div class="muted">No capabilities yet.</div>'}
      `;
      if (status.captureRoots) {
        $('captureRoots').innerHTML = [
          `<div>Capture roots: ${status.captureRoots.map(escapeHtml).join(', ') || '(none configured)'}</div>`,
          ...(status.recentCaptureFiles || []).map(file => `<button onclick="useImportPath(${jsArg(file.path)})">${escapeHtml(file.path)}</button>`),
        ].join('');
      }
    }

    function renderCapability(capability) {
      const savesDashboardToken = capability.kind === 'ui' && (capability.scopes || []).includes('admin');
      const controls = capability.status === 'active'
        ? `<button onclick="revokeCapability('${escapeAttribute(capability.id)}')">Revoke</button><button onclick="rotateCapability('${escapeAttribute(capability.id)}', ${savesDashboardToken ? 'true' : 'false'})">Rotate</button>`
        : '';
      return `
        <div class="sample">
          <div><strong>${escapeHtml(capability.label || capability.kind)}</strong> <span class="badge">${escapeHtml(capability.status)}</span></div>
          <div class="muted">${escapeHtml(capability.id)} / ${escapeHtml(capability.kind)} / ${(capability.scopes || []).map(escapeHtml).join(', ')}</div>
          <div class="row" style="margin-top:8px">${controls}</div>
        </div>
      `;
    }

    async function bootstrapAdminToken() {
      const created = await api('/api/security/capabilities', {
        method: 'POST',
        body: JSON.stringify({
          kind: 'ui',
          label: 'Local dashboard',
          scopes: ['admin', 'api:read', 'api:write', 'jobs:write', 'agent:write'],
        }),
      });
      localStorage.setItem(TOKEN_STORAGE_KEY, created.token);
      $('securityToken').value = created.token;
      $('pairingCode').innerHTML = '<div class="notice">Admin token created and saved locally.</div>';
      await refreshSecurityStatus({ silent: true });
      await refreshStatus();
      await loadReview();
    }

    function saveSecurityToken() {
      const token = $('securityToken').value.trim();
      if (token) localStorage.setItem(TOKEN_STORAGE_KEY, token);
      else localStorage.removeItem(TOKEN_STORAGE_KEY);
      refreshSecurityStatus({ silent: true }).catch(() => {});
    }

    function clearSecurityToken() {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      $('securityToken').value = '';
      renderSecurityLocked('Local token cleared.');
    }

    async function createExtensionPairingCode() {
      const created = await api('/api/security/pairing-codes', {
        method: 'POST',
        body: JSON.stringify({ ttlMs: 5 * 60 * 1000, browser: 'unknown' }),
      });
      $('pairingCode').innerHTML = `
        <div class="muted">Extension challenge ID</div>
        <div class="code-box">${escapeHtml(created.challenge.id)}</div>
        <div class="muted" style="margin-top:8px">Extension pairing secret</div>
        <div class="code-box">${escapeHtml(created.secret)}</div>
      `;
      await refreshSecurityStatus({ silent: true });
    }

    async function revokeCapability(id) {
      await api(`/api/security/capabilities/${id}/revoke`, { method: 'POST', body: '{}' });
      await refreshSecurityStatus({ silent: true });
    }

    async function rotateCapability(id, saveAsDashboardToken) {
      const rotated = await api(`/api/security/capabilities/${id}/rotate`, { method: 'POST', body: '{}' });
      $('pairingCode').innerHTML = `
        <div class="muted">Rotated token</div>
        <div class="code-box">${escapeHtml(rotated.token)}</div>
      `;
      if (saveAsDashboardToken) {
        localStorage.setItem(TOKEN_STORAGE_KEY, rotated.token);
        $('securityToken').value = rotated.token;
      }
      await refreshSecurityStatus({ silent: true });
    }

    async function refreshStatus() {
      const status = await api('/api/status');
      $('metrics').innerHTML = [
        ['Snapshots', status.snapshots],
        ['Unique links', status.resources],
        ['YouTube', status.youtube],
        ['Unmarked', status.unmarked],
        ['Annotated', status.annotated],
        ['Proposed views', status.proposedViews],
        ['Accepted views', status.acceptedViews],
        ['Tab observations', status.observations],
        ['Agent runs', status.agentRuns],
        ['Codex scans', status.codexScanArtifacts],
        ['Atomic items', status.atomicItems],
      ].map(([label, value]) => `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`).join('');
      await loadViews();
      await loadCommands();
      await loadJobs();
    }

    async function importSnapshot() {
      $('importResult').textContent = 'Importing...';
      const result = await api('/api/import-file', {
        method: 'POST',
        body: JSON.stringify({ file: $('importPath').value }),
      });
      $('importResult').textContent = `Imported ${result.tabCount} tabs into ${result.resourceCount} resources.`;
      await refreshStatus();
      await loadReview();
    }

    async function runExtraction() {
      $('commandResult').innerHTML = '<div class="notice">Refreshing local extraction artifacts...</div>';
      const result = await api('/api/extract/run', { method: 'POST', body: '{}' });
      $('commandResult').innerHTML = `<div class="notice">Extracted ${result.artifactsWritten} artifacts across ${result.resourcesProcessed} resources.</div>`;
      await refreshStatus();
    }

    async function runScan() {
      $('commandResult').innerHTML = '<div class="notice">Creating durable Codex scan job...</div>';
      const created = await api('/api/jobs/codex-scan', {
        method: 'POST',
        body: JSON.stringify({
          limit: 10,
          batchSize: 5,
          reasoningEffort: $('reasoningEffort').value,
        }),
      });
      $('commandResult').innerHTML = `<div class="notice">Created ${created.job.id}. Queued ${created.resourcesQueued}, skipped fresh ${created.resourcesSkippedFresh}. Use Resume from Jobs to process it.</div>`;
      await refreshStatus();
    }

    async function planCommand() {
      const mode = selectedPlannerMode();
      $('commandResult').innerHTML = `<div class="notice">Planning proposed view with ${mode === 'codex' ? 'Codex agent' : 'heuristic preview'}...</div>`;
      const result = await api('/api/agent/command', {
        method: 'POST',
        body: JSON.stringify({
          text: $('commandText').value,
          mode,
          candidateLimit: 200,
          reasoningEffort: $('reasoningEffort').value,
        }),
      });
      showCommandResult(result);
      await refreshStatus();
    }

    async function newConversation() {
      conversationSnapshot = await api('/api/conversations', {
        method: 'POST',
        body: JSON.stringify({ title: 'TabAtlas agent thread' }),
      });
      activeThreadId = conversationSnapshot.thread.id;
      renderConversation();
    }

    async function sendConversation() {
      const text = $('conversationText').value.trim();
      if (!text) return;
      if (!activeThreadId) await newConversation();
      $('conversationTranscript').innerHTML = '<div class="notice">Thinking...</div>';
      conversationSnapshot = await api(`/api/conversations/${activeThreadId}/messages`, {
        method: 'POST',
        body: JSON.stringify({
          content: text,
          reasoningEffort: $('reasoningEffort').value,
        }),
      });
      $('conversationText').value = '';
      renderConversation();
      await refreshStatus();
    }

    function renderConversation() {
      if (!conversationSnapshot) {
        $('conversationTranscript').textContent = 'No conversation loaded.';
        $('actionCards').innerHTML = '';
        return;
      }
      $('conversationTranscript').innerHTML = conversationSnapshot.messages.map(message => `
        <div class="message ${escapeAttribute(message.role)}">
          <strong>${escapeHtml(message.role)}</strong><br>${escapeHtml(message.content)}
        </div>
      `).join('') || '<div class="muted">No messages yet.</div>';
      $('actionCards').innerHTML = conversationSnapshot.actions.length ? conversationSnapshot.actions.map(renderActionCard).join('') : '';
    }

    function renderActionCard(action) {
      const result = action.result ? `<div class="muted">${escapeHtml(JSON.stringify(action.result).slice(0, 280))}</div>` : '';
      const controls = action.status === 'proposed' && action.approval === 'confirm'
        ? `<button class="primary" onclick="confirmAction('${escapeAttribute(action.id)}')">Confirm</button><button onclick="cancelAction('${escapeAttribute(action.id)}')">Cancel</button>`
        : action.status === 'proposed'
          ? `<button onclick="cancelAction('${escapeAttribute(action.id)}')">Cancel</button>`
          : '';
      return `
        <div class="action-card">
          <div><strong>${escapeHtml(action.kind)}</strong> <span class="badge">${escapeHtml(action.status)}</span> <span class="badge">${escapeHtml(action.approval)}</span></div>
          <div class="muted">${escapeHtml(action.action.rationale || '')}</div>
          ${result}
          <div class="row" style="margin-top:8px">${controls}</div>
        </div>
      `;
    }

    async function confirmAction(actionId) {
      await api(`/api/agent-actions/${actionId}/confirm`, { method: 'POST', body: '{}' });
      if (activeThreadId) conversationSnapshot = await api(`/api/conversations/${activeThreadId}`);
      renderConversation();
      await refreshStatus();
    }

    async function cancelAction(actionId) {
      await api(`/api/agent-actions/${actionId}/cancel`, { method: 'POST', body: '{}' });
      if (activeThreadId) conversationSnapshot = await api(`/api/conversations/${activeThreadId}`);
      renderConversation();
    }

    function showCommandResult(result) {
      currentCommandResult = result;
      $('commandResult').innerHTML = renderCommandResult(result);
    }

    function renderCommandResult(result) {
      const preview = result.previews[0];
      if (!preview) return `<div class="notice">${result.message}</div>`;
      const badgeHtml = result.mode ? `
            <span class="badge">Mode: ${escapeHtml(result.mode)}</span>
            <span class="badge">Codex used: ${result.codexTurnSpent ? 'yes' : 'no'}</span>
            <span class="badge">Validation: ${escapeHtml(result.validationStatus || 'unknown')}</span>
            <span class="badge">No browser tabs changed</span>
      ` : `
            <span class="badge">Stored preview</span>
            <span class="badge">No browser tabs changed</span>
      `;
      const visibleSamples = preview.samples.filter(sample => activeSampleStates.has(sample.state));
      return `
        <div class="panel">
          <div class="row" style="margin-bottom:10px">
            ${badgeHtml}
          </div>
          <div class="resource-title">${preview.name}</div>
          <div class="muted">${preview.goal || ''}</div>
          ${renderCounts(preview.countsByState)}
          <div class="row">
            <button class="primary" onclick="acceptView('${preview.viewId}')">Accept view</button>
            <button onclick="loadViewPreview('${preview.viewId}')">Refresh preview</button>
          </div>
          <h2 style="margin-top:14px">Rules</h2>
          <div class="muted">Include: ${preview.inclusionRules.join('; ')}</div>
          <div class="muted">Exclude: ${preview.exclusionRules.join('; ')}</div>
          <h2 style="margin-top:14px">Refine</h2>
          <textarea id="refineText" placeholder="Refine this view"></textarea>
          <div class="row" style="margin-top:10px">
            <button onclick="refineView('${escapeAttribute(preview.viewId)}')">Refine view</button>
          </div>
          <h2 style="margin-top:14px">Samples</h2>
          <div class="filters row" style="margin-bottom:8px">
            ${sampleStates.map(state => `<button class="${activeSampleStates.has(state) ? 'active' : ''}" onclick="toggleSampleState('${state}')">${state.replace('_', ' ')}</button>`).join('')}
          </div>
          ${visibleSamples.map(sample => renderSample(sample, preview.viewId)).join('') || '<div class="muted">No samples match the active filters.</div>'}
        </div>
      `;
    }

    function renderCounts(counts) {
      const labels = {
        strong_include: 'Strong',
        weak_include: 'Weak',
        conflict: 'Conflict',
        needs_review: 'Review',
        exclude: 'Exclude',
      };
      return `<div class="counts">${Object.entries(labels).map(([key, label]) => `<div class="count"><strong>${counts[key] || 0}</strong><br>${label}</div>`).join('')}</div>`;
    }

    function renderSample(sample, viewId) {
      const safeId = cssSafeId(`${viewId}_${sample.resourceId}`);
      return `
        <div class="sample">
          <div><strong>${escapeHtml(sample.title)}</strong></div>
          <div class="muted">${sample.state}${sample.section ? ` / ${escapeHtml(sample.section)}` : ''} / ${Math.round(sample.confidence * 100)}%</div>
          <div class="muted">${escapeHtml(sample.reason || '')}</div>
          <div class="row" style="margin-top:8px">
            <button onclick="whyIncluded('${escapeAttribute(viewId)}', '${escapeAttribute(sample.resourceId)}', '${safeId}')">Why included?</button>
            <button onclick="recordFeedback('${escapeAttribute(viewId)}', '${escapeAttribute(sample.membershipId)}', '${escapeAttribute(sample.resourceId)}', 'pin_include')">Pin include</button>
            <button onclick="recordFeedback('${escapeAttribute(viewId)}', '${escapeAttribute(sample.membershipId)}', '${escapeAttribute(sample.resourceId)}', 'pin_exclude')">Pin exclude</button>
            <button onclick="recordFeedback('${escapeAttribute(viewId)}', '${escapeAttribute(sample.membershipId)}', '${escapeAttribute(sample.resourceId)}', 'reject')">Reject</button>
            <a class="button" target="_blank" rel="noreferrer" href="${escapeAttribute(sample.redactedUrl || '#')}">Open externally</a>
          </div>
          <div id="why_${safeId}" class="muted" style="margin-top:6px"></div>
        </div>
      `;
    }

    async function acceptView(viewId) {
      const preview = await api(`/api/views/${viewId}/apply`, {
        method: 'POST',
        body: JSON.stringify({ mode: 'accepted' }),
      });
      $('commandResult').innerHTML = `<div class="notice">Accepted ${preview.name}. Browser tabs were not changed.</div>${renderCounts(preview.countsByState)}`;
      await refreshStatus();
    }

    async function loadViewPreview(viewId) {
      const preview = await api(`/api/views/${viewId}/preview`);
      showCommandResult({ message: '', previews: [preview] });
    }

    async function loadViews() {
      const views = await api('/api/views');
      $('viewsList').innerHTML = views.length ? views.map(view => `
        <div class="sample">
          <div><strong>${escapeHtml(view.name)}</strong></div>
          <div class="muted">${view.status} / ${view.origin}</div>
          <button onclick="loadViewPreview('${view.id}')">Preview</button>
        </div>
      `).join('') : '<div class="muted">No views yet.</div>';
    }

    async function loadCommands() {
      const commands = await api('/api/commands');
      $('commandsList').innerHTML = commands.length ? commands.map(command => {
        const firstView = command.viewIds && command.viewIds[0];
        return `
          <div class="sample">
            <div><strong>${escapeHtml(command.text)}</strong></div>
            <div class="muted">${escapeHtml(command.status)} / ${escapeHtml(command.created_at)}</div>
            <div class="row" style="margin-top:8px">
              <button onclick="reuseCommand(${jsArg(command.text)})">Reuse</button>
              ${firstView ? `<button onclick="loadViewPreview('${escapeAttribute(firstView)}')">Preview result</button>` : ''}
            </div>
          </div>
        `;
      }).join('') : '<div class="muted">No commands yet.</div>';
    }

    async function loadJobs() {
      const jobs = await api('/api/jobs');
      $('jobsList').innerHTML = jobs.length ? jobs.map(job => `
        <div class="sample">
          <div><strong>${escapeHtml(job.kind)}</strong></div>
          <div class="muted">${escapeHtml(job.id)} / ${escapeHtml(job.status)}</div>
          <div class="muted">pending ${job.progress.pending}, running ${job.progress.running}, succeeded ${job.progress.succeeded}, failed ${job.progress.failed}, skipped ${job.progress.skipped}, cancelled ${job.progress.cancelled}</div>
          <div class="row" style="margin-top:8px">
            <button onclick="resumeJob('${escapeAttribute(job.id)}')">Resume</button>
            <button onclick="cancelJob('${escapeAttribute(job.id)}')">Cancel</button>
          </div>
        </div>
      `).join('') : '<div class="muted">No jobs yet.</div>';
    }

    async function resumeJob(jobId) {
      $('commandResult').innerHTML = `<div class="notice">Resuming ${escapeHtml(jobId)}...</div>`;
      const result = await api(`/api/jobs/${jobId}/resume`, {
        method: 'POST',
        body: JSON.stringify({ maxItems: 10 }),
      });
      $('commandResult').innerHTML = `<div class="notice">Processed ${result.processedItems}; scanned ${result.scannedResources}; skipped ${result.skippedItems}; failed ${result.failedItems}; Codex turns ${result.codexTurns || 0}.</div>`;
      await refreshStatus();
    }

    async function cancelJob(jobId) {
      await api(`/api/jobs/${jobId}/cancel`, { method: 'POST', body: '{}' });
      await refreshStatus();
    }

    async function refineView(viewId) {
      const text = $('refineText') ? $('refineText').value : '';
      if (!text.trim()) return;
      $('commandResult').innerHTML = '<div class="notice">Refining view...</div>';
      const result = await api('/api/agent/refine', {
        method: 'POST',
        body: JSON.stringify({
          viewId,
          text,
          mode: selectedPlannerMode(),
          candidateLimit: 200,
          reasoningEffort: $('reasoningEffort').value,
        }),
      });
      showCommandResult(result);
      await refreshStatus();
    }

    async function whyIncluded(viewId, resourceId, safeId) {
      const result = await api(`/api/resources/${resourceId}/explain?viewId=${encodeURIComponent(viewId)}`);
      $(`why_${safeId}`).innerHTML = `${escapeHtml(result.explanation)}<br>Evidence: ${result.evidenceRefs.map(escapeHtml).join(', ') || '(none)'}`;
    }

    async function recordFeedback(viewId, membershipId, resourceId, decision) {
      await api('/api/membership-feedback', {
        method: 'POST',
        body: JSON.stringify({
          viewId,
          membershipId,
          targetKind: 'resource',
          targetId: resourceId,
          decision,
          reason: `User clicked ${decision.replace('_', ' ')}`,
        }),
      });
      $('commandResult').insertAdjacentHTML('afterbegin', `<div class="notice">Saved ${escapeHtml(decision.replace('_', ' '))} feedback. Future views will use it as primary evidence.</div>`);
    }

    function toggleSampleState(state) {
      if (activeSampleStates.has(state)) activeSampleStates.delete(state);
      else activeSampleStates.add(state);
      if (currentCommandResult) $('commandResult').innerHTML = renderCommandResult(currentCommandResult);
    }

    function reuseCommand(text) {
      $('commandText').value = text;
    }

    function useImportPath(path) {
      $('importPath').value = path;
    }

    async function loadReview() {
      selectedTags = new Set();
      const result = await api('/api/review/next?queue=unmarked&preload=2');
      currentReview = result.current;
      if (!currentReview) {
        $('reviewCard').innerHTML = '<div class="muted">No review items.</div>';
        return;
      }
      $('reviewCard').innerHTML = renderReview(result);
    }

    function selectedPlannerMode() {
      const selected = document.querySelector('input[name="plannerMode"]:checked');
      return selected ? selected.value : 'codex';
    }

    function renderReview(result) {
      const item = result.current;
      const url = item.redactedUrl || item.canonicalUrl;
      return `
        <div class="resource-title">${escapeHtml(item.title || '(untitled)')}</div>
        <div class="muted">${escapeHtml(item.host)} / ${escapeHtml(item.urlKind)} / ${escapeHtml(item.extractionStatus)}</div>
        <div class="muted" style="word-break:break-all">${escapeHtml(url)}</div>
        <div class="muted">Groups: ${item.browserGroupTitles.map(escapeHtml).join(', ') || '(none)'}</div>
        <div class="chips row" style="margin-top:12px">${chips.map(tag => `<button onclick="toggleTag('${tag}', this)">${tag}</button>`).join('')}</div>
        <textarea id="reviewNote" placeholder="Note" style="margin-top:10px"></textarea>
        <div class="row" style="margin-top:10px">
          <button class="primary" onclick="saveReview()">Save & next</button>
          <button onclick="skipReview()">Skip</button>
          <button class="danger" onclick="ignoreReview()">Mark ignore</button>
          <a class="button" target="_blank" rel="noreferrer" href="${escapeAttribute(item.canonicalUrl)}">Open externally</a>
        </div>
        <h2 style="margin-top:14px">Next</h2>
        ${result.next.map(next => `<div class="muted">${escapeHtml(next.title || next.canonicalUrl)}</div>`).join('') || '<div class="muted">(none)</div>'}
      `;
    }

    function toggleTag(tag, button) {
      if (selectedTags.has(tag)) {
        selectedTags.delete(tag);
        button.classList.remove('active');
      } else {
        selectedTags.add(tag);
        button.classList.add('active');
      }
    }

    async function saveReview() {
      if (!currentReview) return;
      await api(`/api/review/${currentReview.resourceId}/complete`, {
        method: 'POST',
        body: JSON.stringify({
          tags: [...selectedTags],
          description: $('reviewNote').value,
          decision: selectedTags.has('watch_later') ? 'watch_later' : selectedTags.has('project_reference') ? 'project_reference' : selectedTags.has('inspiration') ? 'inspiration' : 'none',
        }),
      });
      await refreshStatus();
      await loadReview();
    }

    async function skipReview() {
      if (!currentReview) return;
      await api(`/api/review/${currentReview.resourceId}/skip`, { method: 'POST', body: '{}' });
      await loadReview();
    }

    async function ignoreReview() {
      if (!currentReview) return;
      await api(`/api/review/${currentReview.resourceId}/ignore`, { method: 'POST', body: '{}' });
      await refreshStatus();
      await loadReview();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    function cssSafeId(value) {
      return String(value).replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function jsArg(value) {
      return escapeAttribute(JSON.stringify(String(value)));
    }

    $('importButton').addEventListener('click', () => importSnapshot().catch(showError));
    $('refreshButton').addEventListener('click', () => refreshStatus().catch(showError));
    $('extractButton').addEventListener('click', () => runExtraction().catch(showError));
    $('scanButton').addEventListener('click', () => runScan().catch(showCommandError));
    $('planButton').addEventListener('click', () => planCommand().catch(showCommandError));
    $('newConversationButton').addEventListener('click', () => newConversation().catch(showError));
    $('sendConversationButton').addEventListener('click', () => sendConversation().catch(showError));
    $('saveSecurityTokenButton').addEventListener('click', () => saveSecurityToken());
    $('clearSecurityTokenButton').addEventListener('click', () => clearSecurityToken());
    $('bootstrapAdminButton').addEventListener('click', () => bootstrapAdminToken().catch(showError));
    $('refreshSecurityButton').addEventListener('click', () => refreshSecurityStatus().catch(showError));
    $('createPairingCodeButton').addEventListener('click', () => createExtensionPairingCode().catch(showError));

    function showError(error) {
      $('commandResult').innerHTML = `<div class="notice">${escapeHtml(error.message || error)}</div>`;
    }

    function showCommandError(error) {
      $('commandResult').innerHTML = `
        <div class="notice">
          ${escapeHtml(error.message || error)}
          <div class="row" style="margin-top:10px">
            <button onclick="retryHeuristic()">Retry with heuristic</button>
          </div>
        </div>
      `;
    }

    async function retryHeuristic() {
      document.querySelector('input[name="plannerMode"][value="heuristic"]').checked = true;
      await planCommand();
    }

    async function initialLoad() {
      const trusted = await refreshSecurityStatus({ silent: true });
      if (trusted) {
        await refreshStatus();
        await loadReview();
      } else {
        $('metrics').innerHTML = '<div class="metric"><span>Status</span><strong>Locked</strong></div>';
        $('reviewCard').innerHTML = '<div class="muted">Local token required.</div>';
      }
    }

    initialLoad().catch(showError);
  </script>
</body>
</html>
